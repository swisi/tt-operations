services:
  traefik:
    image: traefik:v3.0
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --ping=true
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - tigers-internal
      - tigers-edge
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2026.4.0
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_METRICS: 0.0.0.0:2000
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - tigers-edge

  tt-auth:
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_DOCKER_NETWORK:-tigers-edge}
      traefik.http.routers.tt-auth.rule: Host(`${AUTH_HOST}`)
      traefik.http.routers.tt-auth.entrypoints: web
      traefik.http.services.tt-auth.loadbalancer.server.port: "5000"
    networks:
      - tigers-edge

  tt-agenda:
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_DOCKER_NETWORK:-tigers-edge}
      traefik.http.routers.tt-agenda.rule: Host(`${AGENDA_HOST}`)
      traefik.http.routers.tt-agenda.entrypoints: web
      traefik.http.services.tt-agenda.loadbalancer.server.port: "5000"
    networks:
      - tigers-edge

  tt-analytics:
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_DOCKER_NETWORK:-tigers-edge}
      traefik.http.routers.tt-analytics.rule: Host(`${ANALYTICS_HOST}`)
      traefik.http.routers.tt-analytics.entrypoints: web
      traefik.http.services.tt-analytics.loadbalancer.server.port: "5000"
    networks:
      - tigers-edge

networks:
  tigers-edge:
    name: ${TRAEFIK_DOCKER_NETWORK:-tigers-edge}